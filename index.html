<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Hub</title>
<link rel="apple-touch-icon" href="icon.PNG">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI Hub">
<link href="https://fonts.googleapis.com/css2?family=Product+Sans&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    width:100%;
    height:100%;
    min-height:-webkit-fill-available;
    background:#f1f3f4;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top: calc(env(safe-area-inset-top) + 60px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    padding-left: 44px;
    padding-right: 44px;
}

.logo{
    font-family: 'Product Sans', sans-serif;
    font-size: 44px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    color: #202124;
}
.logo span{ color: #4285F4; }

/* Терминал-анимация */
.terminal{
    width:100%;
    background:white;
    border-radius:28px;
    padding: 16px 20px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    margin-bottom: 48px;
    min-height: 56px;
    display:flex;
    align-items: flex-start;
    flex-direction: column;
    gap: 4px;
}
.terminal-line{
    font-size: 13px;
    color: #9aa0a6;
    font-family: 'Courier New', monospace;
    line-height: 1.5;
    white-space: nowrap;
    overflow: hidden;
}
.terminal-line.done{
    color: #5f6368;
}
.cursor{
    display:inline-block;
    width: 2px;
    height: 14px;
    background: #4285F4;
    margin-left: 2px;
    vertical-align: middle;
    animation: blink .7s infinite;
}
@keyframes blink{
    0%,100%{ opacity:1; }
    50%{ opacity:0; }
}

/* Сетка */
.grid{
    display:grid;
    grid-template-columns: repeat(3, 88px);
    justify-content: center;
    column-gap: 44px;
    row-gap: 44px;
}

.app{
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
}
.app:active{ transform:scale(.90); }

.icon{
    width: 88px;
    height: 88px;
    display:block;
    border-radius:28px;
    box-shadow:0 4px 16px rgba(0,0,0,.15);
    object-fit:cover;
    background: #e8eaed;
}
</style>
</head>
<body>

    <div class="logo">AI <span>Hub</span></div>

    <!-- Терминал анимация -->
    <div class="terminal" id="terminal"></div>

    <div class="grid">
        <a class="app" href="chatgpt://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6448311069';},1500);">
            <img class="icon" src="./ai-ChatGPT.PNG" alt="ChatGPT">
        </a>
        <a class="app" href="googleapp://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6477120684';},1500);">
            <img class="icon" src="./ai-gemini.jpg" alt="Gemini">
        </a>
        <a class="app" href="claude://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6475403990';},1500);">
            <img class="icon" src="./ai-claude.PNG" alt="Claude">
        </a>
        <a class="app" href="ms-copilot://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6453117818';},1500);">
            <img class="icon" src="./ai-copilot.JPG" alt="Copilot">
        </a>
        <a class="app" href="twitter://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6473111535';},1500);">
            <img class="icon" src="./ai-grok.WEBP" alt="Grok">
        </a>
        <a class="app" href="perplexity://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6456990678';},1500);">
            <img class="icon" src="./ai-perplexity.PNG" alt="Perplexity">
        </a>
    </div>

<script>
const lines = [
    "Initializing neural networks...",
    "Loading language models...",
    "Connecting to AI endpoints...",
    "Ready."
];

const terminal = document.getElementById('terminal');
let lineIndex = 0;
let charIndex = 0;
let currentEl = null;
let cursorEl = null;

function nextLine() {
    if (lineIndex >= lines.length) return;

    // Убираем курсор с предыдущей строки
    if (cursorEl) cursorEl.remove();

    currentEl = document.createElement('div');
    currentEl.className = 'terminal-line';
    cursorEl = document.createElement('span');
    cursorEl.className = 'cursor';
    currentEl.appendChild(cursorEl);
    terminal.appendChild(currentEl);

    charIndex = 0;
    typeChar();
}

function typeChar() {
    const line = lines[lineIndex];
    if (charIndex < line.length) {
        currentEl.insertBefore(
            document.createTextNode(line[charIndex]),
            cursorEl
        );
        charIndex++;
        setTimeout(typeChar, 38);
    } else {
        // Строка дописана
        currentEl.classList.add('done');
        lineIndex++;
        if (lineIndex < lines.length) {
            setTimeout(nextLine, 320);
        } else {
            // Всё готово — убираем курсор через секунду
            setTimeout(() => { if(cursorEl) cursorEl.remove(); }, 5000);
        }
    }
}

// Старт
setTimeout(nextLine, 400);
</script>
</body>
</html>

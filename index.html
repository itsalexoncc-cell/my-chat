<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --glass:rgba(255,255,255,.55);
    --green:#22c55e;
    --green-dark:#16a34a;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
    background:#fff;
    font-family:ui-rounded,"SF Pro Rounded","Baloo 2",sans-serif;
    color:#111;
}

/* HEADER */
.header{
    padding:calc(env(safe-area-inset-top) + 16px) 20px 10px;
    display:flex;
    align-items:center;
    gap:14px;
}

.menu-btn{
    width:44px;height:44px;
    border:none;background:none;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:5px;
}

.menu-btn span{
    width:26px;height:4px;
    border-radius:4px;
    background:#111;
}

.header h1{
    font-size:30px;
    font-weight:700;
}

/* HERO */
.hero{
    margin:16px;
    padding:34px 20px;
    border-radius:32px;
    background:var(--glass);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,.6);
    text-align:center;
}

.wave-wrap{
    width:calc(100% + 40px);
    margin:-8px -20px 10px;
    height:84px;
}

#waveCanvas{width:100%;height:100%;display:block;}

.hero h2{font-size:26px;margin-bottom:8px;}
.hero p{color:#555;font-size:15px;}

/* APPS */
.apps{
    display:flex;
    gap:18px;
    overflow-x:auto;
    padding:10px 20px 18px;
}

.app-item{
    width:92px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.app-tile{
    width:92px;
    height:92px;
    border-radius:22px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

.app-tile img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.app-label{
    font-size:13px;
    font-weight:600;
    color:#444;
}

.search-wrap{
    position:fixed;
    left:20px;
    right:20px;
    bottom:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.input-glow{
    flex:1;
    padding:2px;
    border-radius:30px;
    background:linear-gradient(90deg,#4285f4,#8b5cf6,#ec4899,#22c55e);
}

#searchInput{
    width:100%;
    padding:16px;
    border-radius:28px;
    border:none;
    outline:none;
}

#searchBtn{
    width:58px;
    height:58px;
    border-radius:30px;
    border:none;
    background:#22c55e;
    color:white;
    font-size:18px;
}

/* COLORS */
.chatgpt{background:linear-gradient(135deg,#10a37f,#0a3f36);}
.gemini{background:linear-gradient(135deg,#4285f4,#9b72cb);}
.claude{background:linear-gradient(135deg,#d97757,#b8552e);}
.copilot{background:linear-gradient(135deg,#0f6cbd,#3aa0e0);}
.grok{background:linear-gradient(135deg,#000,#2b2b2b);}
.perplexity{background:linear-gradient(135deg,#20b8a6,#0e7c8c);}

</style>
</head>

<body>

<div class="search-wrap">
    <div class="input-glow">
        <input id="searchInput" type="text" placeholder="Напишите запрос...">
    </div>

    <button id="searchBtn" onclick="searchGoogle()">
        🔍
    </button>
</div>

<script>
function searchGoogle(){
    const q = document.getElementById("searchInput").value;
    if(!q) return;
    window.open("https://www.google.com/search?q=" + encodeURIComponent(q), "_blank");
}
</script>

<div class="bg"></div>

<!-- HEADER (ВОССТАНОВЛЕНО) -->
<header class="header">
    <button class="menu-btn">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <h1>AI Assistant</h1>
</header>

<!-- HERO (ВОССТАНОВЛЕНО + WAVE) -->
<section class="hero">

    <div class="wave-wrap">
        <canvas id="waveCanvas"></canvas>
    </div>

    <h2>Чем помочь сегодня?</h2>
    <p>Выбери AI ассистента</p>
</section>

<!-- APPS -->
<div class="apps">

    <a class="app-item" href="https://chatgpt.com">
        <div class="app-tile chatgpt"><img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg"></div>
        <div class="app-label">ChatGPT</div>
    </a>

    <a class="app-item" href="https://gemini.google.com">
        <div class="app-tile gemini"><img src="https://upload.wikimedia.org/wikipedia/commons/8/8f/Google-gemini-icon.svg"></div>
        <div class="app-label">Gemini</div>
    </a>

    <a class="app-item" href="https://claude.ai">
        <div class="app-tile claude"><img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Claude_AI_logo.svg"></div>
        <div class="app-label">Claude</div>
    </a>

    <a class="app-item" href="https://copilot.microsoft.com">
        <div class="app-tile copilot"><img src="https://upload.wikimedia.org/wikipedia/commons/8/87/Microsoft_Copilot_Icon.svg"></div>
        <div class="app-label">Copilot</div>
    </a>

    <a class="app-item" href="https://grok.com">
        <div class="app-tile grok"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/X_Ai_logo.svg/512px-X_Ai_logo.svg.png"></div>
        <div class="app-label">Grok</div>
    </a>

    <a class="app-item" href="https://www.perplexity.ai">
        <div class="app-tile perplexity"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d8/Perplexity_AI_logo.svg"></div>
        <div class="app-label">Perplexity</div>
    </a>

</div>

<!-- WAVE SCRIPT (ВОССТАНОВЛЕНО) -->
<script>
const canvas = document.getElementById("waveCanvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize",resize);
resize();

let t = 0;

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const h = canvas.height;
    const w = canvas.width;

    for(let i=0;i<4;i++){
        ctx.beginPath();
        ctx.strokeStyle = `rgba(80,120,255,${0.3 - i*0.05})`;
        ctx.lineWidth = 2;

        for(let x=0;x<w;x++){
            const y = h/2 + Math.sin(x*0.01 + t + i)*20;
            ctx.lineTo(x,y);
        }

        ctx.stroke();
    }

    t += 0.03;
    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

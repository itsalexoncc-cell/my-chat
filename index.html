<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Assistant</title>

<style>
:root{
    --glass:rgba(255,255,255,.55);
    --green:#22c55e;
    --green-dark:#16a34a;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#ffffff;
    font-family:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,sans-serif;
    overflow-x:hidden;
    color:#111;
}

.header{
    padding:20px;
    display:flex;
    align-items:center;
    gap:14px;
}

.header h1{
    font-size:30px;
    font-weight:700;
}

.hero{
    margin:16px;
    padding:34px 20px 30px;
    border-radius:32px;
    background:var(--glass);
    backdrop-filter:blur(30px);
    border:1px solid rgba(255,255,255,.6);
    text-align:center;
}

.hero h2{
    font-size:26px;
    margin-bottom:8px;
    font-weight:700;
}

.hero p{
    color:#555;
    font-size:15px;
}

/* ===== Иконки ===== */

.apps{
    display:flex;
    gap:18px;
    overflow-x:auto;
    padding:6px 20px 18px;
}

.apps::-webkit-scrollbar{ display:none; }

.app-item{
    flex:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    width:91px;
    cursor:pointer;
}

.app-tile{
    width:91px;
    height:91px;
    border-radius:22px;
    overflow:hidden;
    background:#fff;
    border:1px solid rgba(255,255,255,.4);
    box-shadow:0 6px 14px rgba(0,0,0,.18), 0 2px 4px rgba(0,0,0,.12);
    transition:transform .15s ease;
}

.app-tile:active{
    transform:scale(.92);
}

.app-tile img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.app-label{
    font-size:12px;
    font-weight:600;
    color:#444;
    text-align:center;
}

/* ===== Поиск ===== */

.search-wrap{
    position:fixed;
    left:20px; right:20px;
    bottom:20px;
    display:flex;
    gap:10px;
    align-items:center;
}

.input-glow{
    flex:1;
    padding:2px;
    border-radius:30px;
    background:linear-gradient(90deg,#4285f4,#8b5cf6,#ec4899,#22c55e,#4285f4);
    background-size:300% 300%;
    animation:borderFlow 6s linear infinite;
}

#searchInput{
    width:100%;
    border:none;
    border-radius:28px;
    padding:16px 18px;
    font-size:16px;
    background:#ffffff;
    outline:none;
}

#searchBtn{
    width:58px; height:58px;
    border:none;
    border-radius:30px;
    background:linear-gradient(135deg,#34d058,var(--green-dark));
    color:#fff;
    display:flex; align-items:center; justify-content:center;
}

#searchBtn svg{ width:22px; height:22px; }

@keyframes borderFlow{
    0%{ background-position:0% 50%; }
    50%{ background-position:100% 50%; }
    100%{ background-position:0% 50%; }
}
</style>
</head>

<body>

<header class="header">
    <h1>AI Assistant</h1>
</header>

<section class="hero">
    <h2>Чем помочь сегодня?</h2>
    <p>Задайте вопрос или выберите приложение ниже</p>
</section>

<!-- ===== ИКОНКИ С DEEPLINK + FALLBACK ===== -->

<div class="apps">

    <div class="app-item" onclick="openApp('chatgpt://', 'https://apps.apple.com/app/id6448311069')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/ChatGPT_logo.svg">
        </div>
        <span class="app-label">ChatGPT</span>
    </div>

    <div class="app-item" onclick="openApp('googleapp://gemini', 'https://apps.apple.com/app/id284815942')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4f/Google_Gemini_logo.svg">
        </div>
        <span class="app-label">Gemini</span>
    </div>

    <div class="app-item" onclick="openApp('claude://', 'https://apps.apple.com/app/id6479934029')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Anthropic_Claude_logo.svg">
        </div>
        <span class="app-label">Claude</span>
    </div>

    <div class="app-item" onclick="openApp('copilot://', 'https://apps.apple.com/app/id6472538445')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Microsoft_Copilot_logo.svg">
        </div>
        <span class="app-label">Copilot</span>
    </div>

    <div class="app-item" onclick="openApp('xai://grok', 'https://apps.apple.com/app/id6477560150')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/6f/Grok_logo.svg">
        </div>
        <span class="app-label">Grok</span>
    </div>

    <div class="app-item" onclick="openApp('perplexity://', 'https://apps.apple.com/app/id6446206066')">
        <div class="app-tile">
            <img src="https://upload.wikimedia.org/wikipedia/commons/7/70/Perplexity_AI_logo.svg">
        </div>
        <span class="app-label">Perplexity</span>
    </div>

</div>

<!-- ===== ПОИСК ===== -->

<div class="search-wrap">
    <div class="input-glow">
        <input id="searchInput" type="text" placeholder="Напишите сообщение...">
    </div>
    <button id="searchBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V6"/>
            <path d="M5.5 12.5L12 6l6.5 6.5"/>
        </svg>
    </button>
</div>

<!-- ===== JS: DEEPLINK + FALLBACK ===== -->

<script>
function openApp(deeplink, fallback) {
    const start = Date.now();
    const iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.src = deeplink;
    document.body.appendChild(iframe);

    setTimeout(() => {
        if (Date.now() - start < 1200) {
            window.location.href = fallback;
        }
    }, 900);

    setTimeout(() => iframe.remove(), 2000);
}
</script>

</body>
</html>

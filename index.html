<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Hub</title>
<link rel="apple-touch-icon" href="icon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI Hub">
<link href="https://fonts.googleapis.com/css2?family=Product+Sans&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    width:100%;
    height:100%;
    min-height:-webkit-fill-available;
    background:#f1f3f4;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top: calc(env(safe-area-inset-top) + 60px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    padding-left: 20px;
    padding-right: 20px;
}

/* Логотип */
.logo{
    font-family: 'Product Sans', sans-serif;
    font-size: 44px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    color: #202124;
}
.logo span{ color: #4285F4; }

/* Подзаголовок */
.subtitle{
    font-size: 14px;
    color: #9aa0a6;
    margin-bottom: 32px;
    letter-spacing: 0.3px;
}

/* Карточка-список */
.card{
    width: 100%;
    max-width: 480px;
    background: white;
    border-radius: 28px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,.10);
}

.item{
    display:flex;
    align-items:center;
    text-decoration:none;
    color:#202124;
    padding: 14px 20px;
    border-bottom: 1px solid #f1f3f4;
    transition: background 0.15s;
}
.item:last-child{ border-bottom: none; }
.item:active{ background: #f1f3f4; }

.icon{
    width: 46px;
    height: 46px;
    border-radius: 14px;
    margin-right: 16px;
    flex-shrink: 0;
    object-fit: cover;
    background: #f1f3f4;
}

.name{
    font-size: 17px;
    font-weight: 500;
    flex: 1;
    letter-spacing: -0.2px;
}

.arrow{
    font-size: 20px;
    color: #bdc1c6;
    font-weight: 300;
}
</style>
</head>
<body>

    <div class="logo">AI <span>Hub</span></div>
    <div class="subtitle">Нейросети в одном месте</div>

    <div class="card" id="list">
        <div style="padding:30px;text-align:center;color:#9aa0a6">Загрузка...</div>
    </div>

<script>
const apps = [
    { id:"6448311069", name:"ChatGPT",           scheme:"chatgpt://" },
    { id:"6477120684", name:"Google Gemini",      scheme:"googleapp://" },
    { id:"6475403990", name:"Claude",             scheme:"claude://" },
    { id:"6453117818", name:"Microsoft Copilot",  scheme:"ms-copilot://" },
    { id:"6473111535", name:"Grok",               scheme:"twitter://" }
];

const ids = apps.map(a => a.id).join(",");
fetch(`https://itunes.apple.com/lookup?id=${ids}&entity=software`)
.then(r => r.json())
.then(data => {
    const iconMap = {};
    data.results.forEach(app => {
        iconMap[String(app.trackId)] = app.artworkUrl512 || app.artworkUrl100;
    });

    const list = document.getElementById("list");
    list.innerHTML = apps.map(app => {
        const icon = iconMap[app.id] || "";
        return `<a class="item" href="${app.scheme}" onclick="
            var t=Date.now();
            setTimeout(function(){
                if(Date.now()-t<2000)
                    window.location.href='https://itunes.apple.com/app/id${app.id}';
            },1500);
        ">
            <img class="icon" src="${icon}" alt="${app.name}">
            <span class="name">${app.name}</span>
            <span class="arrow">›</span>
        </a>`;
    }).join("");
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iOS Web Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { display: flex; flex-direction: column; height: 100vh; background: #f5f5f7; }
        #chat-window { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; }
        .msg.incoming { background: #e9e9eb; align-self: flex-start; color: black; }
        .msg.outgoing { background: #007aff; align-self: flex-end; color: white; }
        .msg .name { font-size: 11px; opacity: 0.7; margin-bottom: 3px; display: block; }
        #input-area { display: flex; padding: 10px; background: white; border-top: 1px solid #d1d1d6; gap: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); }
        input { flex: 1; padding: 10px 15px; border: 1px solid #d1d1d6; border-radius: 20px; font-size: 16px; outline: none; }
        button { background: #007aff; color: white; border: none; padding: 0 20px; border-radius: 20px; font-weight: bold; font-size: 15px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="chat-window"></div>

    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
        <button id="send-btn">Отпр.</button>
    </div>

    <!-- Подключаем Firebase SDK со специальными модулями -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ FIREBASE (Вставь сюда СВОИ данные)
        const firebaseConfig = {
  apiKey: "AIzaSyDjrf31YqY1DZK9cFHPUDiFIZF2xcVsVZc",
  authDomain: "ios-chat-7b9eb.firebaseapp.com",
  projectId: "ios-chat-7b9eb",
  storageBucket: "ios-chat-7b9eb.firebasestorage.app",
  messagingSenderId: "175359872932",
  appId: "1:175359872932:web:0f97b172eba4d411a0bb31",
  measurementId: "G-0589PK5QFQ"
};

        // Инициализируем
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const messagesRef = collection(db, "messages");

        // Придумываем случайное имя для этого сеанса (чтобы отличать пользователей)
        const myName = "Юзер_" + Math.floor(Math.random() * 1000);

        const chatWindow = document.getElementById("chat-window");
        const msgInput = document.getElementById("msg-input");
        const sendBtn = document.getElementById("send-btn");

        // Функция отправки
        async function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = "";

            try {
                await addDoc(messagesRef, {
                    name: myName,
                    text: text,
                    createdAt: serverTimestamp()
                });
            } catch (e) {
                console.error("Ошибка отправки: ", e);
            }
        }

        sendBtn.addEventListener("click", sendMessage);
        msgInput.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

        // Слушаем базу в реальном времени
        const q = query(messagesRef, orderBy("createdAt", "asc"));
        onSnapshot(q, (snapshot) => {
            chatWindow.innerHTML = ""; // Очищаем перед перерисовкой
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (!data.text) return;

                const msgDiv = document.createElement("div");
                const isMe = data.name === myName;
                
                msgDiv.className = `msg ${isMe ? 'outgoing' : 'incoming'}`;
                msgDiv.innerHTML = `<span class="name">${data.name}</span>${data.text}`;
                
                chatWindow.appendChild(msgDiv);
            });
            chatWindow.scrollTop = chatWindow.scrollHeight; // Скролл вниз
        });
    </script>
</body>
</html>

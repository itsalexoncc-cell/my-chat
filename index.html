<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>iOS Web Chat</title>

<link rel="icon" type="image/jpeg" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="apple-touch-icon" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;}

html,body{
height:100vh;
height:100dvh;
overflow:hidden;
background:#007aff;
}

body{
display:flex;
flex-direction:column;
}

/* HEADER */
#profile-header{
padding:14px 18px 20px;
display:flex;
align-items:center;
gap:14px;
flex-shrink:0;
}

#back-btn{
border:none;
background:transparent;
color:white;
font-size:34px;
cursor:pointer;
}

#avatar-container{
width:56px;height:56px;border-radius:50%;
overflow:hidden;background:#fff;
display:flex;align-items:center;justify-content:center;
}

#name-input{
flex:1;
border:none;
background:transparent;
color:white;
font-size:20px;
outline:none;
}

/* CHAT */
#chat-window{
flex:1;
overflow-y:auto;
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
background:#f3f4f8;
border-top-left-radius:34px;
border-top-right-radius:34px;
}

.msg{max-width:78%;padding:10px 14px;border-radius:18px;}
.incoming{background:#fff;align-self:flex-start;}
.outgoing{background:#007aff;color:#fff;align-self:flex-end;}

/* CHAT LIST */
#chat-list{
flex:1;
overflow-y:auto;
display:none;
background:#f3f4f8;
border-top-left-radius:34px;
border-top-right-radius:34px;
padding:10px;
}

/* INPUT */
#input-area{
display:flex;
gap:10px;
padding:10px 14px calc(12px + env(safe-area-inset-bottom));
background:rgba(255,255,255,0.9);
}

#msg-input{
flex:1;
height:42px;
border-radius:20px;
border:none;
padding:0 14px;
}

#send-btn{
width:42px;height:42px;border-radius:50%;
border:none;
background:#007aff;
color:#fff;
}
</style>
</head>

<body>

<!-- HEADER -->
<div id="profile-header">
<button id="back-btn">‹</button>

<div id="avatar-container"></div>

<input id="name-input" placeholder="Твое имя...">
</div>

<!-- CHAT -->
<div id="chat-window"></div>

<!-- CHAT LIST -->
<div id="chat-list"></div>

<!-- INPUT -->
<div id="input-area">
<input id="msg-input" placeholder="Message">
<button id="send-btn">➤</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } 
from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDjrf31Y...",
authDomain:"ios-chat-7b9eb.firebaseapp.com",
projectId:"ios-chat-7b9eb"
});

const db = getFirestore(app);
const messagesRef = collection(db,"messages");

/* ELEMENTS */
const chatWindow = document.getElementById("chat-window");
const chatList = document.getElementById("chat-list");
const inputArea = document.getElementById("input-area");
const backBtn = document.getElementById("back-btn");
const msgInput = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");

let deviceId = localStorage.getItem("device_id") || crypto.randomUUID();
localStorage.setItem("device_id", deviceId);

let myName = localStorage.getItem("chat_name") || "User";

/* SEND */
async function sendMessage(){
const text = msgInput.value.trim();
if(!text) return;

msgInput.value="";

await addDoc(messagesRef,{
deviceId,
name:myName,
text,
createdAt:serverTimestamp()
});
}

sendBtn.onclick = sendMessage;

/* LOAD */
onSnapshot(query(messagesRef,orderBy("createdAt","asc")),snap=>{
chatWindow.innerHTML="";

snap.forEach(doc=>{
const d = doc.data();
const el = document.createElement("div");

const isMe = d.deviceId===deviceId;

el.className = "msg " + (isMe ? "outgoing":"incoming");
el.textContent = d.text;

chatWindow.appendChild(el);
});

chatWindow.scrollTop = chatWindow.scrollHeight;
});

/* SWITCH VIEW */
let open = true;

backBtn.onclick = ()=>{
open=!open;

chatWindow.style.display = open ? "flex":"none";
inputArea.style.display = open ? "flex":"none";
chatList.style.display = open ? "none":"block";
};
</script>

</body>
</html>

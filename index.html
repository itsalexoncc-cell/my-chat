<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>iOS Web Chat</title>

<link rel="icon" type="image/jpeg" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="apple-touch-icon" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#007aff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- ===== РЕГИСТРАЦИЯ ===== -->
<div id="registration-screen">
    <div class="reg-container">
        <div class="reg-header">
            <div class="reg-title">Chat</div>
            <div class="reg-subtitle">Давай познакомимся!</div>
        </div>

        <div class="reg-avatar-section">
            <div class="reg-avatar-button" onclick="document.getElementById('reg-file-input').click()">
                <img id="reg-avatar-img" class="reg-avatar-img" style="display:none;">
                <span id="reg-avatar-placeholder" class="reg-avatar-placeholder">+</span>
            </div>
            <div class="reg-avatar-text">Добавить фото</div>
        </div>

        <div class="reg-input-group">
            <div class="reg-label">Твое имя</div>
            <input type="text" id="reg-name-input" class="reg-input" placeholder="Как тебя зовут?">
        </div>

        <div class="reg-input-group">
            <div class="reg-label">Юзернейм</div>
            <input type="text" id="reg-username-input" class="reg-input" placeholder="@username">
        </div>

        <button id="reg-button" class="reg-button" disabled>Начать</button>
    </div>
    <input type="file" id="reg-file-input" accept="image/*" style="display:none;">
</div>

<!-- ===== ШАПКА ===== -->
<div id="profile-header">
    <button id="back-btn">‹</button>

    <div id="avatar-container" onclick="handleAvatarClick()">
        <img id="avatar-img" src="" style="display:none;">
        <span id="avatar-placeholder">👤</span>
    </div>

    <input type="file" id="file-input" accept="image/*" style="display:none;">

    <div id="header-name"></div>

    <button id="delete-chat-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M19 6.4L5.4 20M5 6.4L18.6 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </button>
</div>

<!-- ===== ОСНОВНОЙ КОНТЕНТ ===== -->
<div id="main-content">
    <div id="chat-window" class="hidden"></div>

    <div id="chats-list">
        <div class="chats-header">
            <div class="chats-title">Сообщения</div>
            <button class="new-chat-btn" onclick="window.openFindUserScreen()">+</button>
        </div>
        <div id="chats-list-items"></div>
    </div>
</div>

<!-- ===== ПОИСК ПОЛЬЗОВАТЕЛЯ ===== -->
<div id="find-user-screen">
    <div class="find-user-header">
        <button class="find-back-btn" onclick="window.closeFindUserScreen()">‹</button>
        <input type="text" id="find-search-input" class="find-search-input" placeholder="Поиск по юзернейму...">
    </div>
    <div id="find-user-content" class="find-user-content"></div>
</div>

<!-- ===== НИЖНЯЯ ПАНЕЛЬ ===== -->
<div id="input-area" class="hidden">
    <input type="text" id="msg-input" placeholder="Your messages" autocomplete="off">
    <input type="file" id="image-input" accept="image/*" style="display:none;">
    <button id="image-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
            <path d="M8 5L6.5 7H5C3.9 7 3 7.9 3 9V17C3 18.1 3.9 19 5 19H19C20.1 19 21 18.1 21 17V9C21 7.9 20.1 7 19 7H17.5L16 5H8Z" stroke="#6b7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="13" r="3" stroke="#6b7280" stroke-width="1.8"/>
        </svg>
    </button>
    <button id="send-btn">➤</button>
</div>

<!-- ===== МОДАЛЬНОЕ ОКНО ===== -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-dialog">
        <div class="modal-title">Удалить чат?</div>
        <div class="modal-text">Это действие нельзя отменить</div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('delete-modal').classList.remove('active')">Отмена</button>
            <button class="modal-btn modal-btn-delete" onclick="window.confirmDeleteChat()">Удалить</button>
        </div>
    </div>
</div>

<!-- ===== ЕДИНСТВЕННЫЙ СКРИПТ ===== -->
<script type="module" src="js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>AI Hub</title>
<link rel="apple-touch-icon" href="icon.jpg">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="AI Hub">
<link href="https://fonts.googleapis.com/css2?family=Product+Sans&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

html, body{
    width:100%;
    height:100%;
    min-height:-webkit-fill-available;
    background:#f1f3f4;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top: calc(env(safe-area-inset-top) + 60px);
    padding-bottom: calc(env(safe-area-inset-bottom) + 20px);
    padding-left: 44px;
    padding-right: 44px;
}

.logo{
    font-family: 'Product Sans', sans-serif;
    font-size: 44px;
    font-weight: 400;
    line-height: 1;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    color: #202124;
}
.logo span{ color: #4285F4; }

/* Строка поиска — заглушка под стиль */
.search-bar{
    width:100%;
    background:white;
    border-radius:28px;
    display:flex;
    align-items:center;
    padding:14px 20px;
    gap:12px;
    box-shadow:0 2px 8px rgba(0,0,0,.12);
    margin-bottom: 48px;
}
.search-text{
    color:#9aa0a6;
    font-size:16px;
    flex:1;
}

/* Сетка */
.grid{
    display:grid;
    grid-template-columns: repeat(3, 88px);
    justify-content: center;
    column-gap: 44px;
    row-gap: 44px;
}

.app{
    text-decoration:none;
    display:flex;
    justify-content:center;
    align-items:center;
}
.app:active{ transform:scale(.90); }

.icon{
    width: 88px;
    height: 88px;
    display:block;
    border-radius:28px;
    box-shadow:0 4px 16px rgba(0,0,0,.15);
    object-fit:cover;
}
</style>
</head>
<body>

    <div class="logo">AI <span>Hub</span></div>

    <a class="search-bar" href="x-web-search://" onclick="window.location.href='x-web-search://';return false;">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="#9aa0a6" stroke-width="2.2"/>
            <path d="M16.5 16.5L21 21" stroke="#9aa0a6" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="search-text">Поиск в Google</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="9" y="2" width="6" height="12" rx="3" fill="#4285F4"/>
            <path d="M5 11a7 7 0 0014 0" stroke="#34A853" stroke-width="2" stroke-linecap="round" fill="none"/>
            <line x1="12" y1="18" x2="12" y2="22" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/>
            <line x1="9" y1="22" x2="15" y2="22" stroke="#EA4335" stroke-width="2" stroke-linecap="round"/>
        </svg>
    </a>

    <div class="grid">
        <!-- ChatGPT -->
        <a class="app" href="chatgpt://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6448311069';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/04/ChatGPT_logo.svg/512px-ChatGPT_logo.svg.png" alt="ChatGPT">
        </a>
        <!-- Gemini -->
        <a class="app" href="googleapp://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6477120684';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Google_Gemini_logo.svg/512px-Google_Gemini_logo.svg.png" alt="Gemini">
        </a>
        <!-- Claude -->
        <a class="app" href="claude://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6475403990';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8a/Claude_AI_logo.svg/512px-Claude_AI_logo.svg.png" alt="Claude">
        </a>
        <!-- Copilot -->
        <a class="app" href="ms-copilot://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6453117818';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Microsoft_365_Copilot_Icon.svg/512px-Microsoft_365_Copilot_Icon.svg.png" alt="Copilot">
        </a>
        <!-- Grok -->
        <a class="app" href="twitter://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6473111535';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/6/6f/Logo_of_X_app.svg/512px-Logo_of_X_app.svg.png" alt="Grok">
        </a>
        <!-- Perplexity -->
        <a class="app" href="perplexity://" onclick="var t=Date.now();setTimeout(function(){if(Date.now()-t<2000)window.location.href='https://itunes.apple.com/app/id6456990678';},1500);">
            <img class="icon" src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Perplexity_AI_logo.svg/512px-Perplexity_AI_logo.svg.png" alt="Perplexity">
        </a>
    </div>

</body>
</html>

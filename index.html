<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Chat</title>
<link rel="icon" type="image/jpeg" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="apple-touch-icon" href="https://itsalexoncc-cell.github.io/my-chat/IMG_0101.jpeg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a8cff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Chat">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ===== РЕГИСТРАЦИЯ ===== -->
<div id="registration-screen">
    <div class="reg-container">
        <div class="reg-logo">
            <div class="reg-logo-icon">💬</div>
            <div class="reg-title">Chat</div>
            <div class="reg-subtitle">Давай познакомимся!</div>
        </div>
        <input type="text" id="reg-name-input" class="reg-input" placeholder="Твоё имя">
        <input type="text" id="reg-username-input" class="reg-input" placeholder="@username">
        <button id="reg-button" class="reg-button">→</button>
    </div>
</div>

<!-- ===== ГЛАВНАЯ ОБОЛОЧКА ===== -->
<div id="app-shell">

    <!-- ТОЛЬКО ТАБЫ -->
    <div id="top-bar">
        <div id="tabs">
            <button class="tab-btn active" onclick="window.switchTab('feed')" id="tab-feed">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
                </svg>
                Лента
            </button>
            <button class="tab-btn" onclick="window.switchTab('profile')" id="tab-profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                </svg>
                Профиль
            </button>
            <button class="tab-btn" onclick="window.switchTab('chats')" id="tab-chats">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                </svg>
                Чаты
            </button>
        </div>
    </div>

    <!-- КОНТЕНТ -->
    <div id="main-content">

        <!-- ЛЕНТА -->
        <div id="feed-screen" class="screen active">
            <div id="feed-items"></div>
        </div>

        <!-- ПРОФИЛЬ -->
        <div id="profile-screen" class="screen">
            <div class="profile-header-section">
                <div class="profile-big-avatar" id="profile-big-avatar">
                    <img id="profile-avatar-img" style="display:none;">
                    <span id="profile-avatar-placeholder">👤</span>
                </div>
                <div class="profile-info">
                    <div class="profile-name" id="profile-name-text">—</div>
                    <div class="profile-username" id="profile-username-text">@—</div>
                </div>
            </div>
            <div class="profile-photos-title">Фотографии</div>
            <div class="photos-grid" id="photos-grid"></div>
            <input type="file" id="file-input" accept="image/*" style="display:none;">
        </div>

        <!-- ЧАТЫ -->
        <div id="chats-screen" class="screen">
            <div class="chats-search-bar">
                <input type="text" id="chats-search-input" class="chats-search-input" placeholder="Поиск чатов...">
            </div>
            <div id="chats-list-items"></div>
        </div>

    </div>
</div>

<!-- ===== ЧАТ ===== -->
<div id="chat-view">
    <div class="chat-top-bar">
        <button class="chat-back-btn" onclick="window.closeChat()">←</button>
        <div class="chat-contact-avatar" id="chat-contact-avatar">
            <img id="chat-contact-avatar-img" style="display:none;">
            <span id="chat-contact-avatar-placeholder">👤</span>
        </div>
        <div class="chat-contact-name" id="chat-contact-name">—</div>
    </div>
    <div id="chat-window"></div>
    <div id="input-area">
        <input type="text" id="msg-input" placeholder="Сообщение..." autocomplete="off">
        <input type="file" id="image-input" accept="image/*" style="display:none;">
        <button id="image-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                <circle cx="12" cy="13" r="4"/>
            </svg>
        </button>
        <button id="send-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
            </svg>
        </button>
    </div>
</div>

<!-- ===== ПОИСК ПОЛЬЗОВАТЕЛЯ ===== -->
<div id="find-user-screen">
    <div class="find-header">
        <button class="find-back-btn" onclick="window.closeFindUserScreen()">←</button>
        <input type="text" id="find-search-input" class="find-search-input" placeholder="Поиск по @username...">
    </div>
    <div id="find-user-content" class="find-user-content"></div>
</div>

<!-- ===== FAB ===== -->
<button class="fab" id="fab-btn">+</button>

<!-- ===== МОДАЛ НОВОГО ПОСТА ===== -->
<div id="new-post-modal">
    <div class="new-post-sheet">
        <div class="sheet-handle"></div>
        <div class="sheet-title">Новый пост</div>
        <textarea id="new-post-input" placeholder="Что у тебя нового?"></textarea>
        <div class="sheet-btns">
            <button class="sheet-btn-cancel" onclick="window.closePostModal()">Отмена</button>
            <button class="sheet-btn-post" onclick="window.submitPost()">Опубликовать</button>
        </div>
    </div>
</div>

<!-- ===== МОДАЛ УДАЛЕНИЯ ===== -->
<div class="modal-overlay" id="delete-modal">
    <div class="modal-dialog">
        <div class="modal-title">Удалить чат?</div>
        <div class="modal-text">Это действие нельзя отменить</div>
        <div class="modal-buttons">
            <button class="modal-btn modal-btn-cancel" onclick="document.getElementById('delete-modal').classList.remove('active')">Отмена</button>
            <button class="modal-btn modal-btn-delete" onclick="window.confirmDeleteChat()">Удалить</button>
        </div>
    </div>
</div>

<!-- ===== РЕГИСТРАЦИЯ — ЛОГИКА ПРЯМО ЗДЕСЬ ===== -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getFirestore, setDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDjrf31YqY1DZK9cFHPUDiFIZF2xcVsVZc",
    authDomain: "ios-chat-7b9eb.firebaseapp.com",
    projectId: "ios-chat-7b9eb",
    storageBucket: "ios-chat-7b9eb.firebasestorage.app",
    messagingSenderId: "175359872932",
    appId: "1:175359872932:web:0f97b172eba4d411a0bb31"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ===== DEVICE ID =====
let deviceId = localStorage.getItem("device_id");
if (!deviceId) {
    deviceId = crypto.randomUUID();
    localStorage.setItem("device_id", deviceId);
}

const regScreen        = document.getElementById("registration-screen");
const appShell         = document.getElementById("app-shell");
const regNameInput     = document.getElementById("reg-name-input");
const regUsernameInput = document.getElementById("reg-username-input");
const regButton        = document.getElementById("reg-button");

// Если уже зарегистрирован — скрыть экран регистрации
const savedName = localStorage.getItem("chat_name");
if (savedName) {
    regScreen.classList.add("hidden");
    appShell.style.display = "flex";
    updateProfileUI();
}

regButton.addEventListener("click", async () => {
    const name     = regNameInput.value.trim();
    const username = regUsernameInput.value.trim().toLowerCase().replace("@", "");

    regNameInput.style.borderColor     = !name     ? "rgba(255,100,100,0.7)" : "rgba(255,255,255,0.15)";
    regUsernameInput.style.borderColor = !username ? "rgba(255,100,100,0.7)" : "rgba(255,255,255,0.15)";

    if (!name || !username) return;

    try {
        localStorage.setItem("chat_name",     name);
        localStorage.setItem("chat_username", username);
        localStorage.setItem("chat_avatar",   "");

        await setDoc(doc(db, "users", deviceId), {
            deviceId,
            name,
            username,
            avatar:    "",
            updatedAt: serverTimestamp()
        });

        regScreen.classList.add("hidden");
        appShell.style.display = "flex";
        updateProfileUI();

        // Сообщаем модульному коду что регистрация завершена
        window.dispatchEvent(new CustomEvent("app-ready"));

    } catch(e) {
        console.error("Ошибка регистрации:", e);
        alert("Ошибка: " + e.message);
    }
});

function updateProfileUI() {
    const name     = localStorage.getItem("chat_name")     || "";
    const username = localStorage.getItem("chat_username") || "";
    const avatar   = localStorage.getItem("chat_avatar")   || "";

    const nameEl = document.getElementById("profile-name-text");
    const usEl   = document.getElementById("profile-username-text");
    const img    = document.getElementById("profile-avatar-img");
    const ph     = document.getElementById("profile-avatar-placeholder");

    if (nameEl) nameEl.textContent = name;
    if (usEl)   usEl.textContent   = "@" + username;

    if (avatar && img && ph) {
        img.src = avatar;
        img.style.display = "block";
        ph.style.display  = "none";
    }
}

// Делаем доступным глобально для других модулей
window.updateProfileUI = updateProfileUI;
window.appDeviceId     = deviceId;
</script>

<!-- ===== ОСНОВНОЙ МОДУЛЬНЫЙ КОД ===== -->
<script type="module" src="js/main.js"></script>

</body>
</html>
